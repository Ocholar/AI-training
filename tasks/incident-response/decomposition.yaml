      do the analytical work itself. Read all 20 incident analyses from the
      parallel analysis agents. Build a complete dependency graph including 
      hidden dependencies discovered in context analysis. Identify all resource 
      conflicts. Allocate the 5 available engineers (alice, bob, charlie, diana, 
      eve) respecting: no overlapping time windows, all SLA deadlines, all 
      dependencies (explicit and hidden). Generate incident_analysis.json with 
      root_cause field, resource_allocation_plan.json with engineer 
      assignments, and conflict_resolution_report.txt. Output to /logs/agent/.
